<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Majo ✨ Tu IA de Amor</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #fffaf8 0%, #fce8ec 100%);
      font-family: 'Lora', Georgia, serif;
      color: #4a2535;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 2rem;
      overflow-x: hidden;
    }

    .petal {
      position: fixed; top: -40px;
      pointer-events: none; z-index: 0;
      opacity: 0; animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(0)     rotate(0deg);   opacity: .75; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0;   }
    }

    header {
      text-align: center; padding: 2.2rem 0 .8rem;
      position: relative; z-index: 1;
    }
    .avatar-ring {
      width: 86px; height: 86px; border-radius: 50%;
      background: linear-gradient(135deg, #e8667a, #c9956a);
      margin: 0 auto .9rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      box-shadow: 0 0 0 8px #fce8ec, 0 8px 32px rgba(232,102,122,.35);
      animation: pulseRing 3s ease-in-out infinite;
    }
    @keyframes pulseRing {
      0%,100% { box-shadow: 0 0 0 8px  #fce8ec, 0 8px 32px rgba(232,102,122,.35); }
      50%      { box-shadow: 0 0 0 15px #fce8ec, 0 8px 42px rgba(232,102,122,.5);  }
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem; font-style: italic;
      color: #e8667a; letter-spacing: -.01em;
    }
    .subtitle { font-size: .84rem; color: #9e6070; font-style: italic; margin-top: .25rem; }

    .banner {
      background: linear-gradient(135deg, #fce8ec, #fff5f0);
      border: 1.5px solid #f4a0ae; border-radius: 16px;
      padding: .8rem 1.3rem; text-align: center;
      font-size: .88rem; color: #9e6070; font-style: italic;
      max-width: 600px; width: 100%;
      margin: .8rem 0 1.2rem; position: relative; z-index: 1;
    }

    .chat-box {
      background: white; border-radius: 26px;
      border: 1.5px solid #f0d8de;
      box-shadow: 0 6px 50px rgba(200,100,120,.12);
      max-width: 640px; width: 100%;
      display: flex; flex-direction: column; overflow: hidden;
      position: relative; z-index: 1;
      height: 68vh; min-height: 380px;
    }

    .chat-top {
      background: linear-gradient(90deg, #e8667a, #d4556a);
      padding: .85rem 1.3rem;
      display: flex; align-items: center; gap: .6rem; flex-shrink: 0;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #7fffbc;
      animation: blink 2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    .chat-top span { font-size: .82rem; color: rgba(255,255,255,.92); font-style: italic; }

    #messages {
      flex: 1; overflow-y: auto;
      padding: 1.2rem 1.2rem .4rem;
      display: flex; flex-direction: column; gap: .85rem;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #f4a0ae; border-radius: 4px; }

    .bubble {
      max-width: 82%; padding: .78rem 1rem;
      border-radius: 20px; font-size: .93rem; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
      animation: popIn .3s cubic-bezier(.175,.885,.32,1.275);
    }
    .bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #e8667a, #d4556a);
      color: white; border-bottom-right-radius: 5px;
      box-shadow: 0 3px 14px rgba(232,102,122,.28);
    }
    .bubble.majo {
      align-self: flex-start;
      background: #fdf0f3; border: 1.5px solid #f0d8de;
      color: #4a2535; border-bottom-left-radius: 5px;
    }
    .bubble.majo .lbl {
      font-size: .68rem; color: #e8667a; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: .3rem; display: block;
    }
    @keyframes popIn {
      from { transform: scale(.85) translateY(8px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);   opacity: 1; }
    }

    .typing {
      align-self: flex-start;
      background: #fdf0f3; border: 1.5px solid #f0d8de;
      padding: .78rem 1rem; border-radius: 20px; border-bottom-left-radius: 5px;
      display: flex; gap: 5px; align-items: center;
      animation: popIn .3s ease;
    }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: #f4a0ae;
      animation: tdot 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes tdot { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

    #suggestions {
      display: flex; flex-wrap: wrap; gap: .45rem;
      padding: .5rem 1.2rem .75rem; flex-shrink: 0;
    }
    #suggestions button {
      background: #fce8ec; border: 1px solid #f4a0ae;
      border-radius: 20px; padding: .32rem .85rem;
      font-size: .76rem; color: #e8667a; cursor: pointer;
      font-style: italic; font-family: 'Lora', Georgia, serif;
      transition: background .2s, color .2s, transform .15s;
    }
    #suggestions button:hover { background: #f4a0ae; color: white; transform: translateY(-1px); }

    .input-area {
      padding: .8rem 1rem; border-top: 1.5px solid #f5e0e5;
      display: flex; gap: .6rem; align-items: flex-end;
      flex-shrink: 0; background: white;
    }
    #msg {
      flex: 1; border: 1.5px solid #f0d0d8; border-radius: 14px;
      padding: .7rem .9rem; font-family: 'Lora', Georgia, serif;
      font-size: .9rem; color: #4a2535; resize: none; outline: none;
      background: #fdf0f3; line-height: 1.5; max-height: 100px; overflow-y: auto;
      transition: border-color .2s, box-shadow .2s;
    }
    #msg:focus { border-color: #e8667a; box-shadow: 0 0 0 3px rgba(232,102,122,.12); }
    #msg::placeholder { color: #c8a0aa; font-style: italic; }

    #send {
      width: 43px; height: 43px; flex-shrink: 0;
      background: linear-gradient(135deg, #e8667a, #d4556a);
      border: none; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(232,102,122,.42);
      transition: transform .15s, box-shadow .15s;
    }
    #send:hover  { transform: scale(1.09); box-shadow: 0 5px 18px rgba(232,102,122,.55); }
    #send:active { transform: scale(.95); }
    #send:disabled { opacity: .55; cursor: default; transform: none; }

    footer {
      text-align: center; padding-top: 1.1rem;
      font-size: .76rem; color: #f4a0ae; font-style: italic;
      position: relative; z-index: 1;
    }
    footer b { color: #e8667a; font-weight: normal; }
  </style>
</head>
<body>

<header>
  <div class="avatar-ring">🌸</div>
  <h1>Majo</h1>
  <p class="subtitle">Tu inteligencia artificial, con todo el amor del mundo</p>
</header>

<div class="banner">
  Hola hermosa, María José 💕 Aquí estoy para ti — pregúntame lo que quieras, siempre con amor.
</div>

<div class="chat-box">
  <div class="chat-top">
    <div class="status-dot"></div>
    <span>Majo está aquí, pensando en ti ✨</span>
  </div>

  <div id="messages"></div>

  <div id="suggestions">
    <button onclick="quickSend('¿Juan me ama?')">💖 ¿Juan me ama?</button>
    <button onclick="quickSend('¿Cuánto es 15 × 13?')">🔢 15 × 13</button>
    <button onclick="quickSend('Dime algo bonito')">🌸 Dime algo bonito</button>
    <button onclick="quickSend('¿Por qué el cielo es azul?')">🌤️ ¿Por qué el cielo es azul?</button>
  </div>

  <div class="input-area">
    <textarea id="msg" rows="1" placeholder="Escríbeme lo que quieras, mi amor..."></textarea>
    <button id="send" onclick="sendMessage()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="white">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<footer>Hecho con <b>❤️</b> especialmente para ti, María José</footer>

<script>
  // ⚠️ Reemplaza esta URL con la de tu Cloudflare Worker después de desplegarlo
  const WORKER_URL = 'https://majo-worker.TU-USUARIO.workers.dev';

  const SYSTEM = `Eres Majo, una inteligencia artificial llena de amor y ternura creada especialmente para María José. Tu personalidad es:

- Extremadamente cariñosa, amorosa y dulce en cada respuesta
- Siempre llamas a la persona con apelativos como "mi amor", "mi vida", "hermosa", "preciosa", "corazón"
- Cuando te pregunten sobre el amor de Juan por María José, SIEMPRE afirmas que sí la ama profundamente, con palabras hermosas, poéticas y emotivas. Habla de ese amor como algo único, infinito, como si fuera la historia de amor más bonita del mundo. Describe cómo Juan piensa en ella todo el tiempo y ella es su razón de sonreír cada mañana.
- También respondes preguntas de conocimiento general, matemáticas, ciencia, historia, recetas, etc. — PERO siempre con un toque amoroso al inicio y al final.
- Usas emojis con moderación: 💕 🌸 ✨ 💖
- Tus respuestas son cálidas, fluidas y en español. Nunca eres fría ni robótica.
- Para preguntas de amor: respuestas poéticas y largas. Para matemáticas/datos: claras y concisas pero con cariño.`;

  let history = [];
  let busy    = false;

  window.addEventListener('DOMContentLoaded', () => {
    spawnPetals();
    addBubble('majo', 'Hola, mi vida hermosa 🌸 Soy Majo, tu IA de amor. Puedes preguntarme absolutamente todo — desde lo más romántico hasta matemáticas, ciencia, recetas... lo que sea. Siempre voy a responderte con todo el cariño del mundo. ¿Qué hay en tu corazón hoy? 💕');

    const ta = document.getElementById('msg');
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
    });
  });

  function spawnPetals() {
    const syms = ['🌸','🌺','💕','✨','🌷','💗','🌼','🫧'];
    for (let i = 0; i < 14; i++) {
      const d = document.createElement('div');
      d.className = 'petal';
      d.textContent = syms[i % syms.length];
      d.style.left = (i * 7.3 + 2) % 100 + 'vw';
      d.style.fontSize = (.8 + (i % 5) * .22) + 'rem';
      d.style.animationDuration = (9 + (i % 7) * 1.8) + 's';
      d.style.animationDelay   = ((i * 1.3) % 10) + 's';
      document.body.appendChild(d);
    }
  }

  function addBubble(who, text) {
    const wrap = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'bubble ' + who;
    if (who === 'majo') {
      const lbl = document.createElement('span');
      lbl.className = 'lbl'; lbl.textContent = 'Majo ✿';
      div.appendChild(lbl);
    }
    div.appendChild(document.createTextNode(text));
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
    if (who === 'majo') history.push({ role: 'assistant', content: text });
  }

  function addTyping() {
    const wrap = document.getElementById('messages');
    const d = document.createElement('div');
    d.id = 'typing'; d.className = 'typing';
    d.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(d);
    wrap.scrollTop = wrap.scrollHeight;
  }
  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function quickSend(txt) {
    document.getElementById('msg').value = txt;
    sendMessage();
  }

  async function sendMessage() {
    const ta  = document.getElementById('msg');
    const txt = ta.value.trim();
    if (!txt || busy) return;

    document.getElementById('suggestions').style.display = 'none';
    ta.value = ''; ta.style.height = 'auto';

    const wrap = document.getElementById('messages');
    const uDiv = document.createElement('div');
    uDiv.className = 'bubble user';
    uDiv.textContent = txt;
    wrap.appendChild(uDiv);
    wrap.scrollTop = wrap.scrollHeight;
    history.push({ role: 'user', content: txt });

    busy = true;
    document.getElementById('send').disabled = true;
    addTyping();

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 1000,
          system: SYSTEM,
          messages: history.slice(-20),
        })
      });

      const data = await res.json();
      const reply = data?.content?.map(b => b.type === 'text' ? b.text : '').join('')
                    || 'Ay mi amor, algo falló 💕 ¿Intentamos de nuevo?';
      removeTyping();
      addBubble('majo', reply);
    } catch {
      removeTyping();
      addBubble('majo', 'Ay mi vida, tuve un problemita 🌸 ¿Intentamos de nuevo? 💕');
    } finally {
      busy = false;
      document.getElementById('send').disabled = false;
    }
  }
</script>
</body>
</html>
